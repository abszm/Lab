services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: npm run dev --workspace backend
    ports:
      - "3001:3001"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - VITE_BACKEND_PROXY_TARGET=http://backend:3001
    command: sh -c "npm install && npm run dev --workspace frontend -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - backend
